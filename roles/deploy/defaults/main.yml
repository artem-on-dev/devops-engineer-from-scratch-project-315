deploy_app_name: bulletins

deploy_docker_registry_repo: artemstepanenko
deploy_docker_container: bulletins
deploy_docker_image: "{{ deploy_docker_registry_repo }}/{{ deploy_app_name }}:{{ deploy_image_tag }}"
deploy_image_tag: "latest"

deploy_app_port: 8080
deploy_app_base_dir: "/opt/{{ deploy_app_name }}"
deploy_tmp_path: "{{ deploy_app_base_dir }}/tmp"
deploy_log_path: "{{ deploy_app_base_dir }}/log"


deploy_s3_bucket: "devops-3"
deploy_s3_region: "fra1"
deploy_s3_endpoint: "https://fra1.digitaloceanspaces.com"
