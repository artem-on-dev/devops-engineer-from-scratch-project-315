db_host: "private-db-postgresql-fra1-25437-do-user-13876020-0.h.db.ondigitalocean.com"
db_port: "25060"
db_name: "defaultdb"
db_sslmode: "require"

domain_name: "devops-3.sytes.net"
# docker config
docker_packages_state: present
docker_users:
  - devops

# nginx config
nginx_remove_default_vhost: true
nginx_vhosts:
  - listen: "80"
    server_name: "{{ domain_name }} www.{{ domain_name }}"
    extra_parameters: |
      location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt
      }
      return 301 https://$host$request_uri;

  - listen: "443 ssl"
    ssl_protocols: "TLSv1.2 TLSv1.3"
    ssl_ciphers: "HIGH:!aNULL:!MD5"
    server_name: "{{ domain_name }} www.{{ domain_name }}"

    extra_parameters: |
      ssl_certificate /etc/letsencrypt/live/{{ domain_name }}/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/{{ domain_name }}/privkey.pem;

      add_header Strict-Transport-Security max-age=31536000 always;
      add_header X-Frame-Options DENY always;
      add_header X-Content-Type-Options nosniff always;
      add_header Referrer-Policy strict-origin-when-cross-origin always;
      add_header Content-Security-Policy "default-src 'self'" always;


      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      location / {
        proxy_pass http://localhost:{{ deploy_app_port }};
      }

      location ~* \.(css|js|png|jpg|jpeg|webp|svg|ico|woff2)$ {
        proxy_pass http://localhost:{{ deploy_app_port }};
        expires 1d;
      }

# SSL Cert config
certbot_auto_renew: true
certbot_create_method: standalone
certbot_create_standalone_stop_services:
  - nginx
certbot_webroot: /var/www/letsencrypt
certbot_create_if_missing: true
certbot_admin_email: "artem.stepanenko.ks.ua@gmail.com"
certbot_certs:
  - domains:
      - "{{ domain_name }}"
      - "www.{{ domain_name }}"
certbot_auto_renew_options: "--webroot -w /var/www/letsencrypt --deploy-hook 'systemctl reload nginx'"

ports:
  - "32223" # custom SSH port
  - "80"
  - "443"
