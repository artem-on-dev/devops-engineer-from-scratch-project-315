- name: Production
  hosts: production
  become: true

  pre_tasks:
    - name: Create ssl_certificate directory
      ansible.builtin.file:
        path: /var/www/letsencrypt
        state: directory
        mode: "0755"

  roles:
    - geerlingguy.docker
    - geerlingguy.nginx
    - geerlingguy.certbot
    - deploy

  tasks:
    - name: Configure firewall
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
      loop: "{{ ports }}"

    - name: Enable firewall
      community.general.ufw:
        state: enabled
        default: deny
